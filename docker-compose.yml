services:
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: ./app
    environment:
      FLASK_APP: wsgi.py
      FLASK_ENV: production
      DB_HOST: 192.168.10.3
      DB_PORT: 5432
      DB_NAME: site_db
      DB_USER: site_app_user
      DB_PASSWORD_FILE: /run/secrets/site_app_db_password
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      TOKEN_EXPIRE_MINUTES: 60
    secrets:
      - site_app_db_password
      - flask_secret_key
    volumes:
      - ./app:/app
      - ./logs/flask:/var/log/flask
    restart: unless-stopped

  fail2ban:
    image: crazymax/fail2ban:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban/jail.d:/data/jail.d:ro
      - ./fail2ban/filter.d:/data/filter.d:ro
      - ./logs/nginx:/var/log/nginx:ro
      - ./logs/flask:/var/log/flask:ro
      - /var/log/auth.log:/var/log/auth.log:ro
    restart: unless-stopped
      
secrets:
  site_app_db_password:
    file: ./secrets/site_app_db_password.txt
  flask_secret_key:
    file: ./secrets/flask_secret_key.txt
  db_admin_password:
    file: ./secrets/db_admin_password.txt
