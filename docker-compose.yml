services:
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: ./app
    environment:
      FLASK_APP: wsgi.py
      FLASK_ENV: production
      DATABASE_URL: postgresql://site_user:strong_password_123@db:5432/site_db
      SECRET_KEY: super_secret_key_change_me
      TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      - db
    volumes:
      - ./app:/app
      - ./logs/flask:/var/log/flask
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: site_db
      POSTGRES_USER: site_user
      POSTGRES_PASSWORD: strong_password_123
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  fail2ban:
    image: crazymax/fail2ban:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban/jail.d:/data/jail.d:ro
      - ./fail2ban/filter.d:/data/filter.d:ro
      - ./logs/nginx:/var/log/nginx:ro
      - ./logs/flask:/var/log/flask:ro
      - /var/log/auth.log:/var/log/auth.log:ro
    restart: unless-stopped

volumes:
  pg_data:
