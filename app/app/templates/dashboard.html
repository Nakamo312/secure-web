<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .box { max-width: 700px; margin: auto; background: white; padding: 24px; border-radius: 8px; }
        .card { border: 1px solid #ddd; padding: 16px; margin-top: 20px; border-radius: 6px; }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Dashboard</h1>
        <p>Пользователь: <strong>{{ username }}</strong></p>

        <div class="card">
            <h3>System status</h3>
            <p>Web server: OK</p>
            <p>Authentication: OK</p>
            <p>Database: OK</p>
        </div>

        <p><a href="/logout">Выйти</a></p>
    </div>
</body>
</html>
